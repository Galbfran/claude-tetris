<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>

        <div class="panel-section">
          <button id="theme-toggle">
            <span class="toggle-icon">☾</span>
            <span class="toggle-label">LIGHT</span>
          </button>
        </div>

        <div class="panel-section">
          <span class="label">SKIN</span>
          <select id="skin-selector">
            <option value="retro">Retro</option>
            <option value="neon">Neon</option>
            <option value="pastel">Pastel</option>
            <option value="pixelart">Pixel Art</option>
          </select>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <div id="name-entry" class="hidden">
          <p>¡Nuevo récord! Ingresa tu nombre:</p>
          <input type="text" id="player-name" maxlength="12" placeholder="Tu nombre">
          <button id="save-record-btn">Guardar</button>
        </div>
        <div id="records-table-container"></div>
        <button id="reset-records-btn">Resetear récords</button>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>

    <div id="pause-overlay" class="overlay hidden">
      <div class="overlay-box pause-box">
        <h2 class="pause-title">PAUSA</h2>
        <button id="resume-btn">Reanudar</button>
        <button id="restart-from-pause-btn">Reiniciar</button>
        <button id="controls-toggle-btn">Ver controles</button>
        <div id="controls-list" class="hidden">
          <ul class="controls-ul">
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída rápida</li>
            <li><kbd>P</kbd> / <kbd>Esc</kbd> pausa</li>
          </ul>
        </div>
        <div class="start-level-row">
          <label for="start-level">Nivel inicial:</label>
          <select id="start-level">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
            <option value="11">11</option>
            <option value="12">12</option>
            <option value="13">13</option>
            <option value="14">14</option>
            <option value="15">15</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
