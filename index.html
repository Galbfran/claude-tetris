<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>

        <div class="panel-section">
          <button id="theme-toggle">
            <span class="toggle-icon">☾</span>
            <span class="toggle-label">LIGHT</span>
          </button>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <!-- Menú de pausa -->
      <div class="overlay-box" id="pause-menu">
        <p class="overlay-title">PAUSA</p>
        <button id="resume-btn">&#9654; Reanudar</button>
        <button id="restart-btn">&#8634; Reiniciar</button>
        <button id="controls-btn">&#9000; Ver controles</button>
        <div id="controls-list" class="controls-list hidden">
          <ul>
            <li><kbd>&#8592;</kbd><kbd>&#8594;</kbd> mover</li>
            <li><kbd>&#8593;</kbd> / <kbd>X</kbd> rotar</li>
            <li><kbd>&#8595;</kbd> bajar (soft drop)</li>
            <li><kbd>Space</kbd> caída rápida</li>
            <li><kbd>P</kbd> / <kbd>Esc</kbd> pausa</li>
          </ul>
        </div>
        <div class="level-selector">
          <span class="level-label">Nivel inicial</span>
          <div class="level-controls">
            <button id="level-down">&#8722;</button>
            <span id="start-level-display">1</span>
            <button id="level-up">+</button>
          </div>
        </div>
      </div>

      <!-- Game Over -->
      <div class="overlay-box hidden" id="gameover-menu">
        <p class="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <button id="gameover-restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
